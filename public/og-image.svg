<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Veneto Comunità Itinerante</title>
  <desc id="desc">Cammini, Ecocamp e rete associativa in Veneto.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFCF0" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="180" cy="120" r="140" fill="#F59E0B" opacity="0.12" />
  <circle cx="1070" cy="520" r="170" fill="#0369A1" opacity="0.14" />
  <path d="M120 450 C 260 380, 360 500, 500 430 S 760 360, 920 420 S 1040 470, 1140 390" fill="none" stroke="#0369A1" stroke-width="16" stroke-linecap="round" opacity="0.65"/>
  <path d="M120 500 C 260 430, 360 550, 500 480 S 760 410, 920 470 S 1040 520, 1140 440" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
